services:
  mongo:
    image: mongo:7
    container_name: vienovo-forms-mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: vienovo
      MONGO_INITDB_ROOT_PASSWORD: vienovo_dev_password
      MONGO_INITDB_DATABASE: vienovo_forms
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:1
    container_name: vienovo-forms-mongo-ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: vienovo
      ME_CONFIG_MONGODB_ADMINPASSWORD: vienovo_dev_password
      ME_CONFIG_MONGODB_URL: mongodb://vienovo:vienovo_dev_password@mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
